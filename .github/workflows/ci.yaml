name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

env:
  MICROKIT_VERSION: 2.1.0
  MICROKIT_URL: https://github.com/seL4/microkit/releases/download/2.1.0/microkit-sdk-2.1.0
  SDFGEN_VERSION: 0.28.1
  ZIG_VERSION: 0.15.1

jobs:
  build_manual:
    name: Build manual
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31
      - name: Create nix-shell and build PDF
        run: |
          cd docs
          nix develop .#docs --ignore-environment -c bash -c 'pandoc MANUAL.md -o MANUAL.pdf'
      - name: Upload manual PDF
        uses: actions/upload-artifact@v4
        with:
          name: MANUAL
          path: docs/MANUAL.pdf
  build_linux_x86_64:
    name: Build and run examples (Linux x86-64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'
      - name: Download Microkit SDK
        run: |
          wget ${{ env.MICROKIT_URL }}-linux-x86-64.tar.gz
          tar xf microkit-sdk-${{ env.MICROKIT_VERSION }}-linux-x86-64.tar.gz
      - name: Install dependencies (via apt)
        # 'expect' is only a dependency for CI testing
        run: sudo apt update && sudo apt install -y make clang lld llvm qemu-system-arm device-tree-compiler expect gcc-aarch64-linux-gnu
      - name: Install Zig
        uses: mlugg/setup-zig@v2.0.5
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Setup pyenv
        run: |
          python3 -m venv venv
          ./venv/bin/pip install --upgrade sdfgen==${{ env.SDFGEN_VERSION }}
      - name: Setup systems-ci
        uses: au-ts/systems-ci@main
        with:
          path: systems-ci
      - name: Build examples
        run: ./ci/build.py ${PWD}/microkit-sdk-${{ env.MICROKIT_VERSION }} $(nproc)
        shell: bash
        env:
          PYTHON: ${{ github.workspace }}/venv/bin/python

  build_macos_arm64:
    name: Build and run examples (macOS ARM64)
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'
      - name: Download Microkit SDK
        run: |
          wget ${{ env.MICROKIT_URL }}-macos-aarch64.tar.gz
          tar xf microkit-sdk-${{ env.MICROKIT_VERSION }}-macos-aarch64.tar.gz
      - name: Install dependencies (via Homebrew)
        # 'expect' is only a dependency for CI testing
        run: |
          brew install llvm lld qemu dtc make dosfstools expect
          echo "/opt/homebrew/opt/llvm/bin:$PATH" >> $GITHUB_PATH
      - name: Install Zig
        uses: mlugg/setup-zig@v2.0.5
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Setup pyenv
        run: |
          python3.13 -m venv venv
          ./venv/bin/pip install --upgrade sdfgen==${{ env.SDFGEN_VERSION }}
      - name: Setup systems-ci
        uses: au-ts/systems-ci@main
      - name: Build examples
        run: python3.13 ./ci/build.py ${PWD}/microkit-sdk-${{ env.MICROKIT_VERSION }} $(nproc)
        shell: bash
        env:
          PYTHON: ${{ github.workspace }}/venv/bin/python

  build_linux_x86_64_nix:
    name: Build and run examples (Linux x86-64 via Nix)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'
      - name: Setup systems-ci
        uses: au-ts/systems-ci@main
        with:
          path: systems-ci
      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Get Nix dependencies
        run: nix develop -c bash -c 'echo Hello World'
      - name: Build examples
        run: nix develop --ignore-environment -c bash -c 'source systems-ci/setup.sh && CI=1 ./ci/build.py $MICROKIT_SDK $(nproc)'
      - name: Archive image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loader-images
          path: |
            ci_build/**/loader.img
            ci_build/**/sel4_32.elf
          if-no-files-found: error

  run_qemu:
    name: Run (QEMU)
    runs-on: ubuntu-latest
    needs: build_linux_x86_64_nix
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install dependencies (via apt)
        run: |
          sudo apt update
          sudo apt-get install qemu-system-arm qemu-system-misc qemu-system-x86
      - name: Setup systems-ci
        uses: au-ts/systems-ci@main
      - name: Download images
        uses: actions/download-artifact@v4
        with:
          name: loader-images
          path: ci_build
      - name: Run tests
        run: |
          export PATH="$(pwd)/machine_queue":$PATH
          exec ./ci/run.py --only-qemu
      - name: Archive logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-qemu
          path: ci_logs
          if-no-files-found: error
